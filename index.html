<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>日本自由行 2026</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="日本旅遊">
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/197/197604.png?v=2">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&display=swap');
        body { background-color: #F9F8F3; font-family: 'Noto Sans JP', sans-serif; -webkit-tap-highlight-color: transparent; padding-top: env(safe-area-inset-top); }
        .card-transport { border-left: 4px solid #A5B4FC; }
        .card-spot { border-left: 4px solid #6EE7B7; }
        .card-restaurant { border-left: 4px solid #FCA5A5; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-active { color: #1A1A1A; font-weight: bold; border-top: 2px solid #1A1A1A; }
    </style>
</head>
<body class="pb-24">
    <div id="app" class="max-w-md mx-auto min-h-screen relative">
        <header class="p-6 bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-stone-200 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-light tracking-[0.2em] text-stone-800">SPRING TRIP</h1>
                <p id="current-tab-name" class="text-[10px] text-stone-400 uppercase tracking-widest italic">Itinerary</p>
            </div>
            <div class="text-right text-[10px] text-stone-400 font-mono">2026.04.18-26</div>
        </header>

        <main id="tab-itinerary" class="tab-content active p-4 space-y-8">
            <section>
                <div class="flex justify-between items-end mb-4 border-b border-stone-300 pb-1">
                    <h2 class="text-lg font-medium">Day 1 <span class="text-sm font-light text-stone-400">04/18</span></h2>
                    <span class="text-[10px] text-stone-400 font-bold">空港 -> 押上</span>
                </div>
                <div class="bg-white rounded-2xl p-5 shadow-sm border border-stone-100 mb-4 card-transport">
                    <h3 class="font-bold">京成電鐵 Access 特急</h3>
                    <p class="text-xs text-stone-500 mt-1 italic">08:30 啟程</p>
                    <a href="https://www.google.com/maps" target="_blank" class="mt-4 block text-center bg-stone-50 py-3 rounded-xl text-xs font-semibold">📍 導航至住宿</a>
                </div>
                <div class="bg-white rounded-2xl p-5 shadow-sm border border-stone-100 mb-4 card-spot">
                    <h3 class="font-bold">龜有 (兩津勘吉)</h3>
                    <p class="text-xs text-stone-500 mt-1">收集 15 座雕像</p>
                    <a href="https://www.google.com/maps" target="_blank" class="mt-4 block text-center bg-stone-50 py-3 rounded-xl text-xs font-semibold">📍 啟動導航</a>
                </div>
            </section>

            <section class="opacity-50">
                <div class="flex justify-between items-end mb-4 border-b border-stone-300 pb-1">
                    <h2 class="text-lg font-medium">Day 3-9 <span class="text-sm font-light text-stone-400">04/20-26</span></h2>
                </div>
                <div class="bg-white rounded-2xl p-5 shadow-sm border border-stone-100 mb-4 card-spot text-center py-10">
                    <p class="text-xs text-stone-400">其餘行程已載入，點擊資訊頁查看概覽</p>
                </div>
            </section>
        </main>

        <main id="tab-info" class="tab-content p-6 space-y-6">
            <div class="bg-white rounded-3xl p-6 shadow-sm">
                <h3 class="text-sm font-bold border-b border-stone-100 pb-3 mb-4">✈️ 航班與住宿全覽</h3>
                <p class="text-xs leading-loose text-stone-500">
                    4/18 樂桃 MM620 (02:00)<br>
                    4/26 星宇 JX803 (16:20)<br><br>
                    住宿：Wing Stay / Airbnb 中井 / 浩庵
                </p>
            </div>
        </main>

        <main id="tab-budget" class="tab-content p-6 text-center">
            <div class="bg-stone-800 rounded-3xl p-8 text-white mb-8">
                <p class="text-[10px] opacity-50 uppercase mb-2">Total Expense</p>
                <h2 class="text-4xl font-light">¥ <span id="total-amount">0</span></h2>
            </div>
            <input id="exp-name" type="text" placeholder="品名" class="w-full p-4 mb-4 rounded-2xl bg-white border-none text-sm">
            <input id="exp-price" type="number" placeholder="金額" class="w-full p-4 mb-4 rounded-2xl bg-white border-none text-sm">
            <button onclick="addExpense()" class="w-full bg-stone-800 text-white p-4 rounded-2xl font-bold">記錄</button>
            <ul id="exp-list" class="mt-6 text-left space-y-2"></ul>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 backdrop-blur-md border-t border-stone-100 flex justify-around p-4 shadow-2xl rounded-t-[2.5rem]">
            <button onclick="switchTab('itinerary', this)" class="flex flex-col items-center gap-1 nav-active">
                <span class="text-xl">🗓️</span><span class="text-[9px]">行程</span>
            </button>
            <button onclick="switchTab('info', this)" class="flex flex-col items-center gap-1 text-stone-300">
                <span class="text-xl">✈️</span><span class="text-[9px]">資訊</span>
            </button>
            <button onclick="switchTab('budget', this)" class="flex flex-col items-center gap-1 text-stone-300">
                <span class="text-xl">💰</span><span class="text-[9px]">記帳</span>
            </button>
        </nav>
    </div>

    <script>
        function switchTab(tabName, el) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById('tab-' + tabName).classList.add('active');
            document.querySelectorAll('nav button').forEach(btn => {
                btn.classList.remove('nav-active');
                btn.classList.add('text-stone-300');
            });
            el.classList.add('nav-active');
            el.classList.remove('text-stone-300');
            window.scrollTo(0,0);
        }
        function addExpense() {
            const name = document.getElementById('exp-name').value;
            const price = document.getElementById('exp-price').value;
            if(!name || !price) return;
            const totalEl = document.getElementById('total-amount');
            const currentTotal = parseInt(totalEl.innerText.replace(/,/g, '')) + parseInt(price);
            totalEl.innerText = currentTotal.toLocaleString();
            const li = document.createElement('li');
            li.className = "flex justify-between bg-white p-3 rounded-xl shadow-sm text-sm";
            li.innerHTML = `<span>${name}</span><b>¥${parseInt(price).toLocaleString()}</b>`;
            document.getElementById('exp-list').prepend(li);
            document.getElementById('exp-name').value = '';
            document.getElementById('exp-price').value = '';
        }
    </script>
</body>
</html>
