<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>日本 2026</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="日本旅遊">
    
    <link rel="apple-touch-icon" href="https://img.icons8.com/clouds/512/tokyo-tower.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&display=swap');
        body { background-color: #F8F7F2; font-family: 'Noto Sans JP', sans-serif; -webkit-tap-highlight-color: transparent; }
        .day-tab.active { background-color: #1A1A1A; color: white; transform: scale(1.05); }
        .timeline-item { position: relative; padding-left: 2rem; border-left: 1px solid #E5E7EB; margin-bottom: 1.5rem; }
        .timeline-item::before { content: ''; position: absolute; left: -5px; top: 0; width: 9px; height: 9px; background: #D1D5DB; border-radius: 50%; }
        .timeline-active::before { background: #1A1A1A; width: 11px; height: 11px; left: -6px; }
        .day-content { display: none; }
        .day-content.active { display: block; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-active { color: #1A1A1A; font-weight: bold; border-top: 2px solid #1A1A1A; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-28">
    <div class="max-w-md mx-auto">
        <header class="p-6 bg-white sticky top-0 z-50 flex justify-between items-end border-b border-stone-100">
            <div>
                <h1 class="text-2xl font-bold tracking-tighter text-stone-800">SPRING TRIP</h1>
                <p class="text-[10px] text-stone-400 font-mono tracking-widest uppercase">Tokyo & Fujisan 2026</p>
            </div>
            <div class="text-2xl">🗻</div>
        </header>

        <div class="bg-white overflow-x-auto whitespace-nowrap p-4 sticky top-[73px] z-40 border-b border-stone-100 no-scrollbar">
            <div class="flex gap-2" id="day-selector">
                <button onclick="showDay(1)" class="day-tab active px-5 py-2 rounded-full text-xs font-bold bg-stone-100">D1</button>
                <button onclick="showDay(2)" class="day-tab px-5 py-2 rounded-full text-xs font-bold bg-stone-100">D2</button>
                <button onclick="showDay(3)" class="day-tab px-5 py-2 rounded-full text-xs font-bold bg-stone-100">D3</button>
                <button onclick="showDay(4)" class="day-tab px-5 py-2 rounded-full text-xs font-bold bg-stone-100">D4</button>
                <button onclick="showDay(5)" class="day-tab px-5 py-2 rounded-full text-xs font-bold bg-stone-100">D5</button>
                <button onclick="showDay(6)" class="day-tab px-5 py-2 rounded-full text-xs font-bold bg-stone-100">D6</button>
                <button onclick="showDay(7)" class="day-tab px-5 py-2 rounded-full text-xs font-bold bg-stone-100">D7</button>
                <button onclick="showDay(8)" class="day-tab px-5 py-2 rounded-full text-xs font-bold bg-stone-100">D8</button>
                <button onclick="showDay(9)" class="day-tab px-5 py-2 rounded-full text-xs font-bold bg-stone-100">D9</button>
            </div>
        </div>

        <main id="tab-itinerary" class="tab-content active p-6">
            <div id="day-content-1" class="day-content active space-y-2">
                <div class="mb-6"><h2 class="text-xl font-bold">04/18 (六) 龜有巡禮</h2></div>
                <div class="timeline-item timeline-active"><span class="text-[10px] font-bold text-stone-400">06:30</span><h3 class="font-bold text-sm">抵達成田 NRT</h3></div>
